services:
  - type: web
    name: academia-saas
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # subir a starter cuando haya tarjeta cargada (free se duerme tras 15min sin trafico)
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "false"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://academysaas.moraapps.com"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: QR_TOKEN_PEPPER
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET_PRIVATE
        value: academysaas
      - key: EMAIL_FROM
        value: "Academia SaaS <no-reply@academysaas.moraapps.com>"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
